<style>
  :root{
    --bg:#e8f7fb; --card:#fff; --ink:#16384a; --muted:#6f8597;
    --accent:#0891b2; --accent2:#22b07d; --good:#22b07d; --bad:#ff5d6c;
    --shadow:0 10px 28px rgba(8,145,178,.16); --radius:18px;
  }
  *{box-sizing:border-box}
  body{
    margin:0; min-height:100vh; color:var(--ink);
    font-family:"Baloo 2","Comic Sans MS","Trebuchet MS",system-ui,sans-serif;
    background:
      radial-gradient(circle at 12% 10%,#c5ecf6 0,transparent 42%),
      radial-gradient(circle at 88% 8%,#d2f5e6 0,transparent 44%),
      var(--bg);
    display:flex; flex-direction:column; align-items:center; padding:20px;
  }
  header{text-align:center; margin:14px 0 6px}
  h1{margin:0; font-size:clamp(1.8rem,6vw,2.8rem)}
  .sub{margin:6px 0 0; color:var(--muted); font-weight:700}
  .help{margin:8px auto 0; color:var(--muted); font-weight:700; font-size:.9rem; max-width:520px}

  .diff{display:flex; gap:10px; justify-content:center; margin:10px 0 0; flex-wrap:wrap}
  .diff button{border:none;cursor:pointer;font:inherit;font-weight:800;padding:9px 16px;
    border-radius:999px;background:#fff;color:var(--ink);box-shadow:var(--shadow)}
  .diff button.on{background:var(--accent);color:#fff}

  .scoreboard{display:flex; gap:10px; margin:16px 0 6px; flex-wrap:wrap; justify-content:center}
  .pill{background:var(--card); border-radius:999px; padding:8px 15px; font-weight:800;
    box-shadow:var(--shadow); font-size:.92rem; display:flex; align-items:center; gap:6px}

  .timerwrap{width:min(620px,94vw); margin:8px 0 2px}
  .timerbar{height:12px; border-radius:999px; background:#d3eaf2; overflow:hidden}
  .timerfill{height:100%; width:100%; border-radius:999px;
    background:linear-gradient(90deg,#22b07d,#7bd88f); transition:width .25s linear}
  .timerfill.warn{background:linear-gradient(90deg,#ffb24a,#ffd27a)}
  .timerfill.danger{background:linear-gradient(90deg,#ff5d6c,#ff8aa0)}

  .game{background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow);
    padding:20px 18px; width:min(620px,94vw); margin-top:10px; text-align:center}

  .prompt{font-size:clamp(1.3rem,5vw,1.9rem); font-weight:800; margin:2px 0 14px; line-height:1.25}
  .prompt .bigflag{display:block; font-size:clamp(3.4rem,15vw,5rem); margin:2px 0 4px; line-height:1}

  .mapwrap{position:relative; width:100%; border-radius:14px; overflow:hidden;
    box-shadow:inset 0 0 0 2px #cfeaf2}
  svg.map{display:block; width:100%; height:auto; touch-action:manipulation; user-select:none}
  .ocean{fill:#bfe6f2}
  .land{fill:#a9d6a0; stroke:#7bb978; stroke-width:.4; transition:fill .15s}
  .land.hot{fill:#c4e6ba}

  .hit{fill:transparent; cursor:pointer}
  .pin{font-size:11px; cursor:pointer; transition:transform .12s; pointer-events:none}
  .pinhalo{fill:#0891b2; opacity:.85; stroke:#fff; stroke-width:1.1; cursor:pointer; transition:transform .12s,fill .15s}
  .pinhalo.right{fill:#22b07d}
  .pinhalo.wrong{fill:#ff5d6c}
  @keyframes pulseG{0%{transform:scale(1)}40%{transform:scale(1.7)}100%{transform:scale(1)}}
  @keyframes shakeR{0%,100%{transform:translateX(0)}20%{transform:translateX(-2.5px)}40%{transform:translateX(2.5px)}60%{transform:translateX(-2px)}80%{transform:translateX(2px)}}
  .pulseG{animation:pulseG .5s ease; transform-box:fill-box; transform-origin:center}
  .shakeR{animation:shakeR .45s ease; transform-box:fill-box; transform-origin:center}
  .lbl{font-size:7px; font-weight:800; fill:#16384a; paint-order:stroke; stroke:#fff; stroke-width:2px; pointer-events:none}
  .floater{font-size:8px; font-weight:800; fill:#22b07d; paint-order:stroke; stroke:#fff; stroke-width:2px; pointer-events:none}

  .feedback{min-height:1.6em; font-weight:800; font-size:1.15rem; margin:14px 0 0}
  .feedback.good{color:var(--good)} .feedback.bad{color:var(--bad)}
  .hearts{font-size:1.1rem; letter-spacing:2px}

  .overlay{position:fixed; inset:0; background:rgba(10,50,65,.55); display:none;
    align-items:center; justify-content:center; padding:20px; z-index:9}
  .overlay.show{display:flex}
  .panel{background:var(--card); border-radius:22px; padding:30px 26px; text-align:center;
    box-shadow:var(--shadow); width:min(420px,92vw)}
  .panel h2{margin:0 0 6px; font-size:1.8rem}
  .panel p{margin:6px 0; color:var(--muted); font-weight:700}
  .panel .big{font-size:2.4rem; font-weight:800; color:var(--accent); margin:8px 0}
  .panel button{margin-top:14px; border:none; cursor:pointer; font:inherit; font-weight:800;
    padding:13px 26px; border-radius:999px; background:var(--accent); color:#fff; font-size:1.1rem}

  .back{margin-top:18px}
  .back a{color:var(--accent); font-weight:800; text-decoration:none}
  @keyframes pop{0%{transform:scale(.9)}60%{transform:scale(1.06)}100%{transform:scale(1)}}
  .pop{animation:pop .25s ease}
  /* --- mobile/tablet responsiveness guard --- */
  html,body{overflow-x:hidden}
  body>*{max-width:100%}
  @media (max-width:600px){ .sub,.help{font-size:.84rem} }
  @media (max-width:400px){ .prompt{font-size:1.15rem} }
</style>

<body>
  <header>
    <h1>🗺️ World Quiz</h1>
    <p class="sub">Find the country on the map — beat the timer!</p>
    <p class="help">Look at the flag, then tap that country on the map! Faster taps and combo streaks earn more points. You only have 3 lives!</p>
  </header>

  <div class="diff" id="diff">
    <button data-d="easy" class="on">😀 Easy</button>
    <button data-d="medium">😎 Medium</button>
    <button data-d="hard">🤓 Hard</button>
  </div>

  <div class="scoreboard">
    <div class="pill">⭐ <span id="score">0</span></div>
    <div class="pill">🏆 Best: <span id="best">0</span></div>
    <div class="pill">📈 Lvl <span id="level">1</span></div>
    <div class="pill">🔥 Combo <span id="streak">0</span></div>
    <div class="pill hearts" id="hearts">❤️❤️❤️</div>
  </div>

  <div class="timerwrap"><div class="timerbar"><div class="timerfill" id="timerfill"></div></div></div>

  <main class="game">
    <div class="prompt" id="prompt"><span class="bigflag">🗺️</span>Loading…</div>
    <div class="mapwrap">
      <svg class="map" id="map" viewBox="0 0 360 180" xmlns="http://www.w3.org/2000/svg" aria-label="World map">
        <rect class="ocean" x="0" y="0" width="360" height="180"></rect>
        <g id="continents">
          <!-- Stylized equirectangular continents (viewBox 360x180, lon:0..360 lat top..bottom) -->
          <!-- North America -->
          <path class="land" data-k="North America" d="M40,28 L92,24 L104,40 L96,58 L80,72 L70,66 L74,52 L58,58 L52,46 L42,44 Z"></path>
          <!-- Central America -->
          <path class="land" data-k="North America" d="M70,72 L84,70 L92,84 L82,92 L74,84 Z"></path>
          <!-- South America -->
          <path class="land" data-k="South America" d="M92,94 L112,92 L118,108 L110,134 L98,150 L92,134 L96,114 L88,104 Z"></path>
          <!-- Europe -->
          <path class="land" data-k="Europe" d="M168,30 L200,26 L208,40 L196,50 L182,54 L172,46 L166,38 Z"></path>
          <!-- Africa -->
          <path class="land" data-k="Africa" d="M170,62 L210,58 L222,80 L214,108 L196,128 L182,112 L176,86 L168,72 Z"></path>
          <!-- Asia -->
          <path class="land" data-k="Asia" d="M212,28 L300,22 L322,44 L308,66 L280,74 L252,66 L232,56 L216,46 L210,36 Z"></path>
          <!-- India peninsula -->
          <path class="land" data-k="Asia" d="M250,66 L268,66 L264,86 L256,92 L250,80 Z"></path>
          <!-- SE Asia / Indonesia -->
          <path class="land" data-k="Asia" d="M286,82 L318,80 L322,94 L300,98 L288,92 Z"></path>
          <!-- Australia -->
          <path class="land" data-k="Oceania" d="M300,118 L332,114 L340,132 L324,144 L304,140 L298,126 Z"></path>
          <!-- New Zealand -->
          <path class="land" data-k="Oceania" d="M344,144 L352,142 L350,156 L342,154 Z"></path>
          <!-- Antarctica (optional) -->
          <path class="land" data-k="Antarctica" d="M40,170 L320,170 L320,178 L40,178 Z"></path>
        </g>
        <g id="pins"></g>
        <g id="fx"></g>
      </svg>
    </div>
    <p class="feedback" id="feedback"></p>
  </main>

  <p class="back"><a href="https://littleplayers.github.io/">← Back to Little Players</a></p>

  <div class="overlay" id="overlay">
    <div class="panel">
      <h2 id="ovTitle">Game Over</h2>
      <p id="ovMsg"></p>
      <div class="big" id="ovScore">0</div>
      <p id="ovBest"></p>
      <button id="ovBtn">▶ Play Again</button>
    </div>
  </div>

<script>
  // ---- Country data: name, flag, latitude, longitude, continent (lat/long verified ~within a few degrees) ----
  const COUNTRIES = [
    // --- Asia ---
    {n:"India",        f:"🇮🇳", lat:21,   lon:78,   k:"Asia"},
    {n:"China",        f:"🇨🇳", lat:35,   lon:104,  k:"Asia"},
    {n:"Japan",        f:"🇯🇵", lat:36,   lon:138,  k:"Asia"},
    {n:"South Korea",  f:"🇰🇷", lat:36,   lon:128,  k:"Asia"},
    {n:"Thailand",     f:"🇹🇭", lat:15,   lon:101,  k:"Asia"},
    {n:"Indonesia",    f:"🇮🇩", lat:-2,   lon:118,  k:"Asia"},
    {n:"Saudi Arabia", f:"🇸🇦", lat:24,   lon:45,   k:"Asia"},
    {n:"Pakistan",     f:"🇵🇰", lat:30,   lon:70,   k:"Asia"},
    {n:"Nepal",        f:"🇳🇵", lat:28,   lon:84,   k:"Asia"},
    {n:"Philippines",  f:"🇵🇭", lat:13,   lon:122,  k:"Asia"},
    {n:"Turkey",       f:"🇹🇷", lat:39,   lon:35,   k:"Asia"},
    {n:"Vietnam",      f:"🇻🇳", lat:16,   lon:108,  k:"Asia"},
    // --- Europe ---
    {n:"United Kingdom",f:"🇬🇧",lat:54,   lon:-2,   k:"Europe"},
    {n:"France",       f:"🇫🇷", lat:47,   lon:2,    k:"Europe"},
    {n:"Germany",      f:"🇩🇪", lat:51,   lon:10,   k:"Europe"},
    {n:"Italy",        f:"🇮🇹", lat:42,   lon:13,   k:"Europe"},
    {n:"Spain",        f:"🇪🇸", lat:40,   lon:-4,   k:"Europe"},
    {n:"Russia",       f:"🇷🇺", lat:60,   lon:90,   k:"Europe"},
    {n:"Greece",       f:"🇬🇷", lat:39,   lon:22,   k:"Europe"},
    {n:"Portugal",     f:"🇵🇹", lat:39,   lon:-8,   k:"Europe"},
    {n:"Netherlands",  f:"🇳🇱", lat:52,   lon:5,    k:"Europe"},
    {n:"Sweden",       f:"🇸🇪", lat:62,   lon:15,   k:"Europe"},
    {n:"Norway",       f:"🇳🇴", lat:61,   lon:8,    k:"Europe"},
    {n:"Poland",       f:"🇵🇱", lat:52,   lon:19,   k:"Europe"},
    // --- Africa ---
    {n:"Egypt",        f:"🇪🇬", lat:27,   lon:30,   k:"Africa"},
    {n:"South Africa", f:"🇿🇦", lat:-30,  lon:25,   k:"Africa"},
    {n:"Nigeria",      f:"🇳🇬", lat:9,    lon:8,    k:"Africa"},
    {n:"Kenya",        f:"🇰🇪", lat:0,    lon:38,   k:"Africa"},
    {n:"Morocco",      f:"🇲🇦", lat:32,   lon:-6,   k:"Africa"},
    {n:"Ethiopia",     f:"🇪🇹", lat:9,    lon:40,   k:"Africa"},
    {n:"Ghana",        f:"🇬🇭", lat:8,    lon:-1,   k:"Africa"},
    {n:"Tanzania",     f:"🇹🇿", lat:-6,   lon:35,   k:"Africa"},
    // --- North America ---
    {n:"United States",f:"🇺🇸", lat:39,   lon:-98,  k:"North America"},
    {n:"Canada",       f:"🇨🇦", lat:58,   lon:-100, k:"North America"},
    {n:"Mexico",       f:"🇲🇽", lat:23,   lon:-102, k:"North America"},
    {n:"Cuba",         f:"🇨🇺", lat:22,   lon:-79,  k:"North America"},
    // --- South America ---
    {n:"Brazil",       f:"🇧🇷", lat:-10,  lon:-52,  k:"South America"},
    {n:"Argentina",    f:"🇦🇷", lat:-35,  lon:-65,  k:"South America"},
    {n:"Peru",         f:"🇵🇪", lat:-10,  lon:-76,  k:"South America"},
    {n:"Chile",        f:"🇨🇱", lat:-33,  lon:-71,  k:"South America"},
    {n:"Colombia",     f:"🇨🇴", lat:4,    lon:-73,  k:"South America"},
    // --- Oceania ---
    {n:"Australia",    f:"🇦🇺", lat:-25,  lon:134,  k:"Oceania"},
    {n:"New Zealand",  f:"🇳🇿", lat:-41,  lon:174,  k:"Oceania"},
    {n:"Fiji",         f:"🇫🇯", lat:-17,  lon:178,  k:"Oceania"},
  ];

  // Projection: equirectangular into 360x180 viewBox.
  // x = (lon + 180) / 360 * 360 = lon + 180
  // y = (90 - lat) / 180 * 180 = 90 - lat
  function projX(lon){ return (lon + 180) / 360 * 360; }
  function projY(lat){ return (90 - lat) / 180 * 180; }

  const DIFF = {
    easy:   {pins:4, maxPins:6, time:14, sameKeyFrom:4, label:"Easy"},
    medium: {pins:5, maxPins:7, time:12, sameKeyFrom:3, label:"Medium"},
    hard:   {pins:6, maxPins:8, time:10, sameKeyFrom:2, label:"Hard"},
  };
  const SVGNS="http://www.w3.org/2000/svg";
  const SK="wq_best";
  const $=id=>document.getElementById(id);
  const fill=$("timerfill"), pinsEl=$("pins"), fxEl=$("fx"), fb=$("feedback");

  let diff="easy", score=0, level=1, streak=0, lives=3, solved=0;
  let best=load(SK,0);
  let target=null, locked=false, running=false;
  let timeLeft, timeMax, timer=null;

  function load(k,d){try{return JSON.parse(localStorage.getItem(k))??d}catch{return d}}
  function save(k,v){localStorage.setItem(k,JSON.stringify(v))}
  function shuffle(a){const x=[...a];for(let i=x.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]]}return x}
  function pick(a){return a[Math.floor(Math.random()*a.length)]}

  // how many pins this round (grows with level, capped per difficulty)
  function pinCount(){
    const cfg=DIFF[diff];
    return Math.min(cfg.maxPins, cfg.pins + Math.floor((level-1)/2));
  }

  // pick the target + decoys. As level rises, prefer same-continent decoys (harder).
  function buildRound(){
    const total=pinCount();
    target=pick(COUNTRIES);
    const sameKeyLevel=DIFF[diff].sameKeyFrom;
    const useSame = level>=sameKeyLevel;
    let prefer = COUNTRIES.filter(c=>c!==target && (useSame ? c.k===target.k : true));
    let rest   = COUNTRIES.filter(c=>c!==target && !prefer.includes(c));
    const decoys=[];
    for(const c of shuffle(prefer)){ if(decoys.length<total-1) decoys.push(c); }
    for(const c of shuffle(rest)){ if(decoys.length<total-1) decoys.push(c); }
    return shuffle([target, ...decoys]);
  }

  function clearMap(){ pinsEl.innerHTML=""; fxEl.innerHTML=""; }

  function highlightContinent(k,on){
    document.querySelectorAll('#continents .land[data-k="'+k+'"]').forEach(p=>p.classList.toggle("hot",on));
  }

  function makePin(c){
    const x=projX(c.lon), y=projY(c.lat);
    const g=document.createElementNS(SVGNS,"g");
    g.dataset.name=c.n; g.dataset.k=c.k;
    // big invisible hit area (touch friendly, ~radius 8 in viewBox units ≈ scales up on screen)
    const hit=document.createElementNS(SVGNS,"circle");
    hit.setAttribute("class","hit");
    hit.setAttribute("cx",x); hit.setAttribute("cy",y); hit.setAttribute("r",8);
    // visible halo dot
    const halo=document.createElementNS(SVGNS,"circle");
    halo.setAttribute("class","pinhalo");
    halo.setAttribute("cx",x); halo.setAttribute("cy",y); halo.setAttribute("r",3.4);
    g.appendChild(hit); g.appendChild(halo);
    const act=(ev)=>{ ev.preventDefault(); choose(c,g,halo); };
    g.addEventListener("click",act);
    g.style.cursor="pointer";
    g.addEventListener("mouseenter",()=>{ if(!locked) highlightContinent(c.k,true); });
    g.addEventListener("mouseleave",()=>{ if(!locked) highlightContinent(c.k,false); });
    return {g,halo,x,y};
  }

  function startGame(){
    score=0; level=1; streak=0; lives=3; solved=0;
    $("overlay").classList.remove("show");
    paint(); nextRound();
  }

  function nextRound(){
    locked=false; clearMap();
    document.querySelectorAll('#continents .land.hot').forEach(p=>p.classList.remove("hot"));
    const set=buildRound();
    $("prompt").innerHTML='<span class="bigflag">'+target.f+'</span>Find <b>'+target.n+'</b>!';
    const p=$("prompt"); p.classList.remove("pop"); void p.offsetWidth; p.classList.add("pop");
    fb.textContent=""; fb.className="feedback";
    set.forEach(c=>{ const {g}=makePin(c); pinsEl.appendChild(g); });
    timeMax=Math.max(6, DIFF[diff].time - (level-1)*0.4);
    timeLeft=timeMax; startTimer();
  }

  function startTimer(){
    stopTimer(); running=true; updateBar();
    timer=setInterval(()=>{
      timeLeft-=0.1;
      if(timeLeft<=0){timeLeft=0; updateBar(); timeUp();} else updateBar();
    },100);
  }
  function stopTimer(){ if(timer){clearInterval(timer);timer=null} running=false; }
  function updateBar(){
    const pct=Math.max(0,(timeLeft/timeMax)*100);
    fill.style.width=pct+"%";
    fill.className="timerfill"+(pct<25?" danger":pct<50?" warn":"");
  }

  function labelAt(c,cls){
    const x=projX(c.lon), y=projY(c.lat);
    const t=document.createElementNS(SVGNS,"text");
    t.setAttribute("class",cls||"lbl");
    t.setAttribute("x",x); t.setAttribute("y",y-6);
    t.setAttribute("text-anchor","middle");
    t.textContent=c.n;
    fxEl.appendChild(t);
    return t;
  }
  function floaterAt(c,txt){
    const x=projX(c.lon), y=projY(c.lat);
    const t=document.createElementNS(SVGNS,"text");
    t.setAttribute("class","floater");
    t.setAttribute("x",x); t.setAttribute("y",y-12);
    t.setAttribute("text-anchor","middle");
    t.textContent=txt;
    fxEl.appendChild(t);
  }

  // reveal the correct pin (used on wrong / timeout)
  function revealTarget(){
    const g=[...pinsEl.children].find(g=>g.dataset.name===target.n);
    if(g){ const halo=g.querySelector(".pinhalo"); halo.classList.add("right"); halo.classList.add("pulseG"); }
    highlightContinent(target.k,true);
    labelAt(target);
  }

  function choose(c,g,halo){
    if(locked) return; locked=true; stopTimer();
    if(c===target || c.n===target.n){
      halo.classList.add("right"); halo.classList.add("pulseG");
      highlightContinent(c.k,true);
      labelAt(c);
      const timeBonus=Math.round(timeLeft*2);
      const pts=10+timeBonus+streak*3;
      streak++; solved++; score+=pts;
      if(best<score){best=score; save(SK,best);}
      if(solved%5===0) level++;
      paint();
      floaterAt(c,"🎉 +"+pts);
      fb.textContent="🎉 +"+pts+" (⏱ +"+timeBonus+")"; fb.className="feedback good";
      setTimeout(nextRound,950);
    } else {
      halo.classList.add("wrong"); halo.classList.add("shakeR");
      revealTarget();
      lives--; streak=0; paint();
      fb.textContent="❌ It was "+target.n; fb.className="feedback bad";
      if(lives<=0) setTimeout(gameOver,1500); else setTimeout(nextRound,1500);
    }
  }

  function timeUp(){
    if(locked) return; locked=true;
    revealTarget();
    lives--; streak=0; paint();
    fb.textContent="⏰ Time! It was "+target.n; fb.className="feedback bad";
    if(lives<=0) setTimeout(gameOver,1600); else setTimeout(nextRound,1600);
  }

  function gameOver(){
    stopTimer();
    $("ovTitle").textContent = (score>=best && score>0) ? "🏆 New Best!" : "Game Over";
    $("ovMsg").textContent="You found "+solved+" countries on "+DIFF[diff].label+".";
    $("ovScore").textContent=score+" pts";
    $("ovBest").textContent="Best score: "+best;
    $("overlay").classList.add("show");
  }

  function paint(){
    $("score").textContent=score; $("best").textContent=best;
    $("level").textContent=level; $("streak").textContent=streak;
    $("hearts").textContent="❤️".repeat(Math.max(0,lives))+"🤍".repeat(Math.max(0,3-lives));
  }

  document.querySelectorAll("#diff button").forEach(b=>{
    b.onclick=()=>{ diff=b.dataset.d;
      document.querySelectorAll("#diff button").forEach(x=>x.classList.toggle("on",x===b));
      startGame(); };
  });

  $("ovBtn").onclick=startGame;
  startGame();
</script>
</body>
</html>
