<title>🚩 Hanuman Run — Little Players</title>

<style>
  :root{ --saffron:#ff7a00; --gold:#ffcf40; }
  *{box-sizing:border-box}
  html,body{overscroll-behavior:none; margin:0}
  body{
    min-height:100vh; color:#fff;
    font-family:"Baloo 2","Trebuchet MS",system-ui,sans-serif;
    background:linear-gradient(180deg,#3a1d00,#1a0c00);
    display:flex; flex-direction:column; align-items:center; padding:14px;
  }
  h1{margin:6px 0 2px; font-size:clamp(1.6rem,6vw,2.4rem); color:var(--gold); text-shadow:0 2px 0 #b35900}
  .sub{margin:0 0 10px; color:#ffd9a8; font-weight:700}

  .diffbar{display:flex; gap:10px; justify-content:center; margin:0 0 10px; flex-wrap:wrap}
  .diffbar button{border:none; cursor:pointer; font:inherit; font-weight:800; padding:8px 20px;
    border-radius:999px; background:#5a2d00; color:#ffd9a8; box-shadow:0 4px 0 #3a1d00}
  .diffbar button.on{background:var(--gold); color:#5a2d00}
  .diffbar button:active{transform:translateY(2px); box-shadow:0 2px 0 #3a1d00}

  .frame{width:min(820px,96vw); position:relative; border-radius:16px; overflow:hidden;
    box-shadow:0 12px 36px rgba(0,0,0,.5); border:4px solid var(--gold)}
  canvas{display:block; width:100%; height:auto; background:#87CEEB; touch-action:none}

  .touch{display:none; gap:12px; margin-top:12px; flex-wrap:wrap; justify-content:center}
  .touch button{border:none; cursor:pointer; font:inherit; font-weight:900; font-size:1.1rem;
    padding:14px 22px; border-radius:16px; color:#fff; box-shadow:0 6px 0 #9a4d00;
    background:linear-gradient(180deg,#ff9a33,#ff7a00)}
  .touch button.strike{background:linear-gradient(180deg,#ffd24a,#ffae00); box-shadow:0 6px 0 #b37700; color:#5a2d00}
  .touch button:active{transform:translateY(4px); box-shadow:0 2px 0 #9a4d00}
  body.touch-on .touch{display:flex}

  .help{margin-top:10px; color:#ffd9a8; font-weight:700; font-size:.9rem; text-align:center; line-height:1.6}
  .help b{color:var(--gold)}
  .back{margin-top:12px}
  .back a{color:var(--gold); font-weight:800; text-decoration:none}

<body>
  <h1>🚩 Hanuman Run</h1>
  <p class="sub">Jump, duck and SMASH the rakshasas — run to Lanka!</p>

  <div class="diffbar" id="diffbar">
    <button data-d="easy" class="on">😀 Easy</button>
    <button data-d="hard">🔥 Hard</button>
  </div>

  <div class="frame"><canvas id="cv" width="820" height="300"></canvas></div>

  <div class="touch">
    <button id="btnJump">⬆ Jump</button>
    <button id="btnDuck">⬇ Duck</button>
    <button id="btnHit" class="strike">🔱 Strike</button>
  </div>

  <p class="help">
    <b>SPACE / ↑</b> Jump &nbsp;·&nbsp; <b>↓</b> Duck &nbsp;·&nbsp; <b>X / →</b> Mace Strike<br/>
    Smash 👹 rakshasas & flying asuras · jump rocks & fire · duck under arrows
  </p>
  <p class="back"><a href="https://littleplayers.github.io/">← Back to Little Players</a></p>

<script>
(function(){
  const cv=document.getElementById("cv"), ctx=cv.getContext("2d");
  const W=cv.width, H=cv.height, GROUND=H-46;
  const GRAV=0.62, JUMP=-12.6;
  const WIN_SCORE=3000;
  const SMASHABLE={demon:1, asura:1, crow:1};   // can be destroyed by the mace

  // staged biomes by score — each has sky colours, ground tone and a scene type
  const BIOMES=[
    {min:0,    name:"🌾 Kishkindha Plains", sky:["#9fd3ff","#dff0ff"], ground:"#8fc14a", soil:"#6f9a37", scene:"plains"},
    {min:500,  name:"🌳 Dandaka Forest",    sky:["#7fc6a8","#cdeede"], ground:"#3f7a3a", soil:"#2c5a29", scene:"jungle"},
    {min:1000, name:"⛰️ Mountains",      sky:["#bcd0e8","#eef4fb"], ground:"#9aa7af", soil:"#6f7a82", scene:"mountains"},
    {min:1500, name:"🏖️ Sea Beach",      sky:["#86c7e8","#e6f7ff"], ground:"#ecd9a0", soil:"#cdb877", scene:"beach"},
    {min:2000, name:"🌊 Across the Sea", sky:["#7fc0e8","#dff2fb"], ground:"#2f8fc4", soil:"#246f9c", scene:"sea"},
    {min:2500, name:"🔥 Lanka Dahan",    sky:["#c23512","#ff8a3a"], ground:"#7a4a22", soil:"#5a3418", scene:"lanka"},
  ];

  // difficulty: easy = slower + fewer obstacles
  const DIFF={
    easy:{base:5, cap:9,  accel:1000, gap:[100,46], tighten:22, label:"Easy"},
    hard:{base:7, cap:14, accel:600,  gap:[60,32],  tighten:36, label:"Hard"},
  };
  let diff="easy";

  let hi=+(localStorage.getItem("hanumanHi")||0);
  let state="idle";                              // idle | playing | dead | win
  let speed=5, score=0, obstacles=[], spawnT=0, biomeIdx=0, bannerT=0, bannerTxt="", tick=0;
  let petals=[], confetti=[], sparks=[], floats=[];
  const player={x:96,y:GROUND,vy:0,onGround:true,duck:false,leg:0,arm:0,atkT:0,atkCd:0,smashes:0};

  // ---------- input ----------
  function jump(){
    if(state!=="playing"){ start(); return; }
    if(player.onGround){ player.vy=JUMP; player.onGround=false; }
  }
  function attack(){
    if(state!=="playing"){ start(); return; }
    if(player.atkCd<=0){ player.atkT=15; player.atkCd=26; }   // swing 15 frames, cooldown 26
  }
  function duckOn(){ if(state==="playing") player.duck=true; }
  function duckOff(){ player.duck=false; }

  addEventListener("keydown",e=>{
    if(e.code==="Space"||e.code==="ArrowUp"){ e.preventDefault(); jump(); }
    else if(e.code==="ArrowDown"){ e.preventDefault(); duckOn(); }
    else if(e.code==="KeyX"||e.code==="ArrowRight"){ e.preventDefault(); attack(); }
  });
  addEventListener("keyup",e=>{ if(e.code==="ArrowDown") duckOff(); });
  cv.addEventListener("pointerdown",e=>{ e.preventDefault(); jump(); });

  const bj=document.getElementById("btnJump"), bd=document.getElementById("btnDuck"), bh=document.getElementById("btnHit");
  const press=(el,on,off)=>{ el.addEventListener("touchstart",e=>{e.preventDefault();on();},{passive:false});
    el.addEventListener("touchend",e=>{e.preventDefault();off&&off();},{passive:false});
    el.addEventListener("mousedown",on); el.addEventListener("mouseup",()=>off&&off()); };
  press(bj,jump); press(bd,duckOn,duckOff); press(bh,attack);
  if(("ontouchstart" in window)||navigator.maxTouchPoints>0) document.body.classList.add("touch-on");

  document.querySelectorAll("#diffbar button").forEach(b=>{
    b.onclick=()=>{ diff=b.dataset.d;
      document.querySelectorAll("#diffbar button").forEach(x=>x.classList.toggle("on",x===b));
      start(); };
  });

  // ---------- flow ----------
  function start(){
    state="playing"; speed=DIFF[diff].base; score=0; obstacles=[]; spawnT=0;
    biomeIdx=0; bannerT=120; bannerTxt=BIOMES[0].name;
    petals=[]; confetti=[]; sparks=[]; floats=[];
    Object.assign(player,{y:GROUND,vy:0,onGround:true,duck:false,leg:0,arm:0,atkT:0,atkCd:0,smashes:0});
  }

  function spawn(){
    if(Math.random()<0.55){
      const kinds=[{type:"rock",w:30,h:30},{type:"rock",w:46,h:44},{type:"fire",w:34,h:42},{type:"demon",w:42,h:64}];
      const k=kinds[Math.floor(Math.random()*kinds.length)];
      obstacles.push({...k,x:W+20,y:GROUND-k.h,f:0,dead:false});
    } else {
      const kinds=[{type:"asura",w:52,h:36},{type:"crow",w:42,h:26},{type:"arrow",w:62,h:14}];
      const k=kinds[Math.floor(Math.random()*kinds.length)];
      obstacles.push({...k,x:W+20,y:GROUND-74-(Math.random()*18),f:0,dead:false});
    }
  }
  function rects(a,b){ return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y; }

  function strikeBox(){
    // active part of the swing only
    if(player.atkT>11 || player.atkT<3) return null;
    return {x:player.x+24, y:player.y-58, w:54, h:52};
  }

  function burst(x,y){
    for(let i=0;i<14;i++) sparks.push({x,y,vx:(Math.random()-.5)*7,vy:(Math.random()-.7)*7,
      life:24,c:["#ffcf40","#ff7a00","#fff","#ff3b3b"][i%4]});
  }
  function floatText(x,y,txt){ floats.push({x,y,txt,life:40}); }

  function update(dt){
    const D=DIFF[diff];
    score+=speed*dt*0.06;
    if(score>200) speed=D.base+Math.min(D.cap-D.base,(score-200)/D.accel);
    // biome progression
    let bi=0; for(let i=0;i<BIOMES.length;i++) if(score>=BIOMES[i].min) bi=i;
    if(bi!==biomeIdx){ biomeIdx=bi; bannerT=120; bannerTxt=BIOMES[bi].name; }
    if(bannerT>0) bannerT-=dt;

    player.vy+=GRAV; player.y+=player.vy;
    if(player.y>=GROUND){ player.y=GROUND; player.vy=0; player.onGround=true; } else player.onGround=false;
    if(player.onGround) player.leg=(player.leg+speed*0.6)%100;
    player.arm+=0.15;
    if(player.atkT>0) player.atkT-=dt; if(player.atkT<0)player.atkT=0;
    if(player.atkCd>0) player.atkCd-=dt;

    spawnT-=dt;
    if(spawnT<=0){ spawn(); spawnT=D.gap[0]-Math.min(D.tighten,speed*3)+Math.random()*D.gap[1]; }

    // smash with mace
    const sb=strikeBox();
    if(sb){ for(const o of obstacles){ if(!o.dead && SMASHABLE[o.type] &&
      rects(sb,{x:o.x+4,y:o.y+2,w:o.w-8,h:o.h-4})){
        o.dead=true; player.smashes++; score+=50; burst(o.x+o.w/2,o.y+o.h/2); floatText(o.x,o.y,"+50"); } } }
    obstacles=obstacles.filter(o=>!o.dead);

    // body collision
    const hb=player.duck?{x:player.x+4,y:player.y-26,w:48,h:26}:{x:player.x+8,y:player.y-54,w:34,h:54};
    for(const o of obstacles){ o.x-=speed; o.f+=0.2;
      if(rects(hb,{x:o.x+5,y:o.y+5,w:o.w-10,h:o.h-8})) die(); }
    obstacles=obstacles.filter(o=>o.x+o.w>-10);

    sparks.forEach(s=>{ s.x+=s.vx; s.y+=s.vy; s.vy+=0.3; s.life-=dt; }); sparks=sparks.filter(s=>s.life>0);
    floats.forEach(f=>{ f.y-=0.6; f.life-=dt; }); floats=floats.filter(f=>f.life>0);

    if(Math.random()<0.04) petals.push({x:W+10,y:Math.random()*120,vx:-(speed*0.4+0.5),s:6+Math.random()*6,r:Math.random()*6});
    petals.forEach(p=>{ p.x+=p.vx; p.y+=Math.sin((p.x+p.r)*0.05)*0.4; p.r+=0.05; }); petals=petals.filter(p=>p.x>-12);

    if(score>=WIN_SCORE) win();
  }

  function die(){ state="dead"; hi=Math.max(hi,Math.floor(score)); localStorage.setItem("hanumanHi",hi); }
  function win(){ state="win"; hi=Math.max(hi,Math.floor(score)); localStorage.setItem("hanumanHi",hi);
    for(let i=0;i<130;i++) confetti.push({x:W/2,y:H/2,vx:(Math.random()-.5)*9,vy:(Math.random()-1)*9,
      c:["#ff7a00","#ffcf40","#ff3b3b","#36c","#2bbf6a","#fff"][i%6],r:3+Math.random()*4}); }

  // ---------- background (staged biomes) ----------
  function lerp(a,b,t){return a+(b-a)*t;}

  function hills(color, amp, base, spd, density, phase){
    ctx.fillStyle=color; const off=score*spd;
    ctx.beginPath(); ctx.moveTo(0,GROUND);
    for(let x=0;x<=W;x+=8){ const y=GROUND-base-amp*(0.5+0.5*Math.sin((x+off)*density+phase)); ctx.lineTo(x,y); }
    ctx.lineTo(W,GROUND); ctx.closePath(); ctx.fill();
  }
  function repeat(spacing, spd, fn){ const off=(score*spd)%spacing;
    for(let bx=-off; bx<W+spacing; bx+=spacing) fn(bx); }
  function clouds(){ ctx.fillStyle="rgba(255,255,255,.8)";
    repeat(300,0.25,bx=>{ const y=46+((bx*13)%30); ctx.beginPath();
      ctx.arc(bx,y,16,0,7); ctx.arc(bx+18,y+4,20,0,7); ctx.arc(bx+40,y,15,0,7); ctx.fill(); }); }
  function flameAt(cx,baseY,w,h){ ctx.beginPath(); ctx.moveTo(cx-w,baseY);
    ctx.quadraticCurveTo(cx-w,baseY-h*0.6,cx,baseY-h);
    ctx.quadraticCurveTo(cx+w,baseY-h*0.6,cx+w,baseY); ctx.closePath(); ctx.fill(); }

  function tree(bx,trunk,canopy,big){ const b=GROUND;
    ctx.fillStyle=trunk; ctx.fillRect(bx-4,b-(big?54:40),8,(big?54:40));
    ctx.fillStyle=canopy; const cy=b-(big?60:46);
    ctx.beginPath(); ctx.arc(bx,cy,big?24:18,0,7); ctx.arc(bx-16,cy+8,big?17:13,0,7); ctx.arc(bx+16,cy+8,big?17:13,0,7); ctx.fill(); }
  function palm(bx){ const b=GROUND; ctx.strokeStyle="#7a4a1f"; ctx.lineWidth=6; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(bx,b); ctx.quadraticCurveTo(bx+8,b-30,bx+4,b-56); ctx.stroke();
    ctx.fillStyle="#2e8b57"; for(let a=-2;a<=2;a++){ ctx.save(); ctx.translate(bx+4,b-56); ctx.rotate(a*0.5);
      ctx.beginPath(); ctx.ellipse(18,0,18,5,0,0,7); ctx.fill(); ctx.restore(); } }
  function pine(bx,s){ const b=GROUND; ctx.fillStyle="#2f6b3a";
    ctx.beginPath(); ctx.moveTo(bx-s,b); ctx.lineTo(bx,b-s*2.4); ctx.lineTo(bx+s,b); ctx.closePath(); ctx.fill(); }

  function scene(B){
    if(B.scene==="plains"){
      hills("#bfe08a",30,10,0.4,0.012,0); hills("#9fce63",54,0,0.8,0.016,2);
      repeat(180,0.8,bx=>{ ctx.fillStyle="#7eb84e"; ctx.beginPath(); ctx.arc(bx,GROUND-6,10,Math.PI,0); ctx.fill(); });
    } else if(B.scene==="jungle"){
      hills("#2f6b46",60,16,0.5,0.013,1); hills("#23512f",80,0,0.9,0.018,3);
      repeat(150,0.9,bx=>tree(bx,"#5a3a1a","#256b34",false));
      repeat(120,1.6,bx=>tree(bx,"#43290f","#1f5c2c",true));
    } else if(B.scene==="mountains"){
      hills("#b9c6d2",40,20,0.3,0.01,0);
      repeat(300,0.6,bx=>{ ctx.fillStyle="#8a99a3"; ctx.beginPath(); ctx.moveTo(bx,GROUND);
        ctx.lineTo(bx+120,GROUND-150); ctx.lineTo(bx+240,GROUND); ctx.closePath(); ctx.fill();
        ctx.fillStyle="#fff"; ctx.beginPath(); ctx.moveTo(bx+96,GROUND-90); ctx.lineTo(bx+120,GROUND-150); ctx.lineTo(bx+144,GROUND-90);
        ctx.quadraticCurveTo(bx+120,GROUND-104,bx+96,GROUND-90); ctx.closePath(); ctx.fill(); });
      repeat(110,1.4,bx=>pine(bx,16));
    } else if(B.scene==="beach"){
      // sea on the horizon meeting the sandy shore
      const sea=ctx.createLinearGradient(0,GROUND-46,0,GROUND); sea.addColorStop(0,"#2f9fd6"); sea.addColorStop(1,"#73c9ee");
      ctx.fillStyle=sea; ctx.fillRect(0,GROUND-46,W,46);
      ctx.fillStyle="rgba(255,255,255,.5)"; const wo=(score*2)%34;
      for(let x=-wo;x<W;x+=34){ ctx.fillRect(x,GROUND-32,16,2); ctx.fillRect(x+10,GROUND-20,16,2); }
      repeat(180,1.3,bx=>palm(bx));
    } else if(B.scene==="sea"){
      // flying across the ocean toward Lanka
      const sea=ctx.createLinearGradient(0,GROUND-90,0,GROUND); sea.addColorStop(0,"#1f7fb6"); sea.addColorStop(1,"#3aa6dd");
      ctx.fillStyle=sea; ctx.fillRect(0,GROUND-90,W,90);
      ctx.fillStyle="rgba(255,255,255,.45)";
      for(let r=0;r<4;r++){ const wo=(score*(1.4+r*0.6))%40, y=GROUND-72+r*16;
        for(let x=-wo;x<W;x+=40) ctx.fillRect(x,y,18,2); }
      // Ram Setu floating stones drifting by
      repeat(120,2.2,bx=>{ ctx.fillStyle="#8a8276"; ctx.beginPath(); ctx.ellipse(bx,GROUND-6,16,7,0,0,7); ctx.fill();
        ctx.fillStyle="#6f6657"; ctx.beginPath(); ctx.ellipse(bx,GROUND-9,11,4,0,0,7); ctx.fill(); });
      // distant Lanka silhouette on the right
      ctx.fillStyle="rgba(180,120,40,.55)";
      for(let i=0;i<3;i++){ const bx=W-130+i*38; ctx.fillRect(bx,GROUND-86,26,40);
        ctx.beginPath(); ctx.moveTo(bx,GROUND-86); ctx.lineTo(bx+13,GROUND-106); ctx.lineTo(bx+26,GROUND-86); ctx.fill(); }
    } else { // lanka fortress — burning (Lanka Dahan)
      hills("#7a3a18",40,18,0.3,0.01,0);
      const t=score*0.3;
      repeat(190,1.2,bx=>{ const b=GROUND,w=54;
        ctx.fillStyle="#6e4a22"; ctx.fillRect(bx-8,b-70,w+16,70);              // scorched tower
        ctx.fillStyle="#5a3a1a"; for(let m=0;m<w+16;m+=12) ctx.fillRect(bx-8+m,b-78,7,10); // battlements
        ctx.fillStyle="#2a1810"; ctx.fillRect(bx+w/2-6,b-34,14,34);            // gate
        // rising smoke
        ctx.fillStyle="rgba(50,42,38,.28)";
        for(let s=0;s<3;s++){ const sy=b-96-((score*1.6+s*46+bx)%96);
          ctx.beginPath(); ctx.arc(bx+w/2+Math.sin(sy*0.08)*10,sy,10+s*4,0,7); ctx.fill(); }
        // flames along the rooftop
        for(let fx=bx-4; fx<bx+w; fx+=13){
          const f1=Math.sin(t+fx)*5, f2=Math.cos(t*1.4+fx)*4;
          ctx.fillStyle="#ff3b00"; flameAt(fx,b-76,7,24+f1);
          ctx.fillStyle="#ff9a00"; flameAt(fx,b-76,5,16+f2);
          ctx.fillStyle="#ffe14a"; flameAt(fx,b-76,3,9+f1*0.4);
        }
        // burning flag
        ctx.fillStyle="#3a1d0a"; ctx.fillRect(bx+w/2-1,b-98,2,18);
        ctx.fillStyle="#ff5a00"; flameAt(bx+w/2+6,b-90,5,12+Math.sin(t+bx)*3); });
      // drifting embers across the sky
      ctx.fillStyle="#ffb24a";
      for(let i=0;i<22;i++){ const ex=(i*89 - score*3)%W, ey=(i*61 + Math.sin(score*0.05+i)*30)%180;
        ctx.fillRect((ex+W)%W, ey, 2, 2); }
    }
  }

  function drawBg(){
    const B=BIOMES[biomeIdx];
    const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,B.sky[0]); g.addColorStop(1,B.sky[1]);
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    // sun with glow
    const sx=W-100,sy=62;
    const sg=ctx.createRadialGradient(sx,sy,4,sx,sy,72);
    sg.addColorStop(0,"rgba(255,246,205,.95)"); sg.addColorStop(1,"rgba(255,246,205,0)");
    ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(sx,sy,72,0,7); ctx.fill();
    ctx.fillStyle="#fff3b0"; ctx.beginPath(); ctx.arc(sx,sy,24,0,7); ctx.fill();
    clouds();
    scene(B);
    // ground (two-tone)
    ctx.fillStyle=B.ground; ctx.fillRect(0,GROUND,W,H-GROUND);
    ctx.fillStyle=B.soil; ctx.fillRect(0,GROUND+(H-GROUND)*0.45,W,(H-GROUND)*0.55);
    ctx.fillStyle="rgba(0,0,0,.10)"; const go=(score*4)%40; for(let x=-go;x<W;x+=40) ctx.fillRect(x,GROUND+3,18,4);
  }

  function drawBanner(){
    if(bannerT<=0) return;
    const a=Math.min(1,bannerT/30);
    ctx.globalAlpha=a; ctx.textAlign="center";
    ctx.fillStyle="rgba(0,0,0,.4)"; roundRect(W/2-130,16,260,40,20); ctx.fill();
    ctx.fillStyle="#ffcf40"; ctx.font="bold 24px 'Baloo 2',sans-serif"; ctx.fillText(bannerTxt,W/2,44);
    ctx.globalAlpha=1;
  }

  // ---------- warrior Hanuman ----------
  function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

  function drawMace(len,headR){
    // drawn from origin along +x; gold gada
    ctx.strokeStyle="#caa23a"; ctx.lineWidth=5; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(len,0); ctx.stroke();
    ctx.fillStyle="#ffcf40"; ctx.beginPath(); ctx.arc(len+headR*0.4,0,headR,0,7); ctx.fill();
    ctx.fillStyle="#e0a92a"; // ribs
    for(let a=0;a<6;a++){ ctx.save(); ctx.translate(len+headR*0.4,0); ctx.rotate(a*Math.PI/3);
      ctx.fillRect(-1.5,-headR,3,headR*0.5); ctx.restore(); }
    ctx.fillStyle="#fff6cf"; ctx.beginPath(); ctx.arc(len+headR*0.1,-headR*0.3,headR*0.28,0,7); ctx.fill();
  }

  function drawHanuman(){
    if(state!=="idle" && BIOMES[biomeIdx].scene==="sea"){ drawFly(); return; }
    const x=player.x, y=player.y, duck=player.duck, running=player.onGround&&state==="playing";
    const SKIN="#d98a3d", SKIN2="#c2762f", DHOTI="#ff7a00", SASH="#e23b2e", GOLD="#ffcf40";
    ctx.save(); ctx.translate(x,y);

    const scale=duck?0.82:1;
    const hipY=duck?-18:-26, chestY=duck?-34:-52, headY=duck?-46:-66, headR=11*scale;

    // ---- tail (behind) ----
    ctx.strokeStyle=SKIN2; ctx.lineWidth=6; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(2,hipY+4);
    ctx.quadraticCurveTo(-34,hipY-2,-30,hipY-34);
    ctx.quadraticCurveTo(-26,hipY-52,-8,hipY-46); ctx.stroke();
    ctx.fillStyle=GOLD; ctx.beginPath(); ctx.arc(-8,hipY-46,3.5,0,7); ctx.fill();

    // ---- legs (running) ----
    ctx.strokeStyle=SKIN; ctx.lineWidth=7; ctx.lineCap="round";
    const sw = running?Math.sin(player.leg*0.25)*9 : (duck?2:4);
    legStroke(13, hipY, sw); legStroke(24, hipY, -sw);
    // dhoti over hips
    ctx.fillStyle=DHOTI; roundRect(8,hipY-2,26,16,5); ctx.fill();
    ctx.fillStyle=SASH; ctx.fillRect(8,hipY+8,26,4);

    // ---- back arm + resting mace OR raised on cooldown ----
    // ---- torso (muscular chest) ----
    ctx.fillStyle=SKIN; roundRect(9,chestY,26,chestY-hipY<0?(hipY-chestY):20,7); ctx.fill();
    // chest shading + necklace
    ctx.fillStyle=SKIN2; ctx.beginPath(); ctx.ellipse(22,chestY+10,11,7,0,0,7); ctx.fill();
    ctx.strokeStyle=GOLD; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(22,chestY+4,8,0.2,Math.PI-0.2); ctx.stroke();

    // ---- mace arm (swings on attack) ----
    const shoulderX=24, shoulderY=chestY+4;
    let armAng;
    if(player.atkT>0){ const p=1-player.atkT/15; armAng=lerp(-2.3,0.55,Math.min(1,p*1.3)); }
    else { armAng=-2.05+Math.sin(player.arm)*0.05; }
    ctx.save(); ctx.translate(shoulderX,shoulderY); ctx.rotate(armAng);
    ctx.strokeStyle=SKIN; ctx.lineWidth=7; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(20,0); ctx.stroke();
    ctx.save(); ctx.translate(20,0); drawMace(16*scale,9*scale); ctx.restore();
    ctx.restore();

    // strike flash arc
    if(player.atkT>2 && player.atkT<12){
      ctx.strokeStyle="rgba(255,220,120,.7)"; ctx.lineWidth=4;
      ctx.beginPath(); ctx.arc(shoulderX,shoulderY,42,-1.0,0.7); ctx.stroke();
    }

    // ---- front arm ----
    ctx.strokeStyle=SKIN2; ctx.lineWidth=6; ctx.beginPath();
    ctx.moveTo(16,chestY+6); ctx.lineTo(duck?30:22, chestY+ (duck?14:18)); ctx.stroke();

    // ---- head (vanara face) ----
    const hx=24, hy=headY;
    ctx.fillStyle=SKIN; ctx.beginPath(); ctx.arc(hx,hy,headR,0,7); ctx.fill();
    // ears
    ctx.beginPath(); ctx.arc(hx-headR*0.9,hy-2,4,0,7); ctx.arc(hx+headR*0.9,hy-2,4,0,7); ctx.fill();
    // muzzle
    ctx.fillStyle="#f0c89a"; ctx.beginPath(); ctx.ellipse(hx+headR*0.45,hy+3,headR*0.55,headR*0.45,0,0,7); ctx.fill();
    ctx.fillStyle="#7a4a1f"; ctx.beginPath(); ctx.arc(hx+headR*0.8,hy+3,1.6,0,7); ctx.fill(); // nose
    // eyes
    ctx.fillStyle="#2a1500"; ctx.beginPath(); ctx.arc(hx+2,hy-3,2,0,7); ctx.arc(hx+headR*0.5,hy-3,2,0,7); ctx.fill();
    // tilak
    ctx.fillStyle=SASH; ctx.fillRect(hx-1,hy-headR*0.8,2,5);
    // crown (mukut)
    ctx.fillStyle=GOLD; ctx.beginPath();
    ctx.moveTo(hx-headR*0.8,hy-headR*0.6); ctx.lineTo(hx-headR*0.5,hy-headR*1.7);
    ctx.lineTo(hx-headR*0.15,hy-headR*0.9); ctx.lineTo(hx+headR*0.15,hy-headR*1.8);
    ctx.lineTo(hx+headR*0.5,hy-headR*0.9); ctx.lineTo(hx+headR*0.7,hy-headR*1.6);
    ctx.lineTo(hx+headR*0.85,hy-headR*0.5); ctx.closePath(); ctx.fill();
    ctx.fillStyle=SASH; ctx.beginPath(); ctx.arc(hx+headR*0.15,hy-headR*1.5,2.2,0,7); ctx.fill();

    ctx.restore();

    function legStroke(lx,ly,s){ ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(lx+s,ly+ (duck?14:22)); ctx.stroke(); }
  }

  // flying pose (used over the sea)
  function drawFly(){
    const x=player.x, y=player.y, bob=Math.sin(player.arm*0.8)*4;
    const SKIN="#d98a3d",SKIN2="#c2762f",DHOTI="#ff7a00",SASH="#e23b2e",GOLD="#ffcf40";
    ctx.save(); ctx.translate(x+10,y-30+bob); ctx.rotate(-0.12);
    // speed trail
    ctx.strokeStyle="rgba(255,255,255,.35)"; ctx.lineWidth=3;
    for(let i=1;i<=3;i++){ ctx.beginPath(); ctx.moveTo(-22-i*10,-2+i*3); ctx.lineTo(-8-i*10,-2+i*3); ctx.stroke(); }
    // tail trailing back, curling up
    ctx.strokeStyle=SKIN2; ctx.lineWidth=6; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(-14,4); ctx.quadraticCurveTo(-46,2,-48,-20); ctx.quadraticCurveTo(-49,-36,-34,-36); ctx.stroke();
    ctx.fillStyle=GOLD; ctx.beginPath(); ctx.arc(-34,-36,3.5,0,7); ctx.fill();
    // legs trailing
    ctx.strokeStyle=SKIN; ctx.lineWidth=7; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(-8,6); ctx.lineTo(-30,12); ctx.moveTo(-8,10); ctx.lineTo(-28,19); ctx.stroke();
    // body (horizontal)
    ctx.fillStyle=SKIN; roundRect(-14,-10,40,20,10); ctx.fill();
    ctx.fillStyle=DHOTI; roundRect(-14,-6,16,15,6); ctx.fill();
    ctx.fillStyle=SASH; ctx.fillRect(-14,3,16,3);
    ctx.fillStyle=SKIN2; ctx.beginPath(); ctx.ellipse(8,0,10,6,0,0,7); ctx.fill();
    ctx.strokeStyle=GOLD; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(8,-4,7,0.2,Math.PI-0.2); ctx.stroke();
    // mace arm forward
    let armAng = player.atkT>0 ? lerp(-0.3,0.8,Math.min(1,(1-player.atkT/15)*1.3)) : -0.1+Math.sin(player.arm)*0.05;
    ctx.save(); ctx.translate(22,-2); ctx.rotate(armAng);
    ctx.strokeStyle=SKIN; ctx.lineWidth=7; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(18,0); ctx.stroke();
    ctx.save(); ctx.translate(18,0); drawMace(15,9); ctx.restore();
    ctx.restore();
    if(player.atkT>2&&player.atkT<12){ ctx.strokeStyle="rgba(255,220,120,.7)"; ctx.lineWidth=4;
      ctx.beginPath(); ctx.arc(22,-2,40,-0.8,0.8); ctx.stroke(); }
    // head
    const hx=30,hy=-8,headR=11;
    ctx.fillStyle=SKIN; ctx.beginPath(); ctx.arc(hx,hy,headR,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(hx-headR*0.9,hy-2,4,0,7); ctx.fill();   // ear
    ctx.fillStyle="#f0c89a"; ctx.beginPath(); ctx.ellipse(hx+headR*0.5,hy+3,headR*0.55,headR*0.42,0,0,7); ctx.fill();
    ctx.fillStyle="#2a1500"; ctx.beginPath(); ctx.arc(hx+2,hy-2,2,0,7); ctx.arc(hx+headR*0.5,hy-2,2,0,7); ctx.fill();
    ctx.fillStyle=GOLD; ctx.beginPath();
    ctx.moveTo(hx-headR*0.8,hy-headR*0.5); ctx.lineTo(hx-headR*0.4,hy-headR*1.6);
    ctx.lineTo(hx,hy-headR*0.8); ctx.lineTo(hx+headR*0.4,hy-headR*1.7);
    ctx.lineTo(hx+headR*0.8,hy-headR*0.5); ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  // ---------- obstacles ----------
  function drawObstacle(o){
    ctx.save(); ctx.translate(o.x,o.y);
    if(o.type==="rock"){ ctx.fillStyle="#6b5847"; roundRect(0,0,o.w,o.h,6); ctx.fill();
      ctx.fillStyle="#574638"; roundRect(4,4,o.w-12,o.h-10,5); ctx.fill(); }
    else if(o.type==="fire"){ ctx.fillStyle="#3a2a1a"; ctx.fillRect(0,o.h-8,o.w,8);
      const fl=Math.sin(o.f)*3; ctx.fillStyle="#ff5a00"; flame(o.w/2,o.h-6,14,o.h-6+fl);
      ctx.fillStyle="#ffcf40"; flame(o.w/2,o.h-6,8,o.h-16+fl); }
    else if(o.type==="demon"){
      ctx.fillStyle="#5a2d6e"; roundRect(2,10,o.w-4,o.h-10,7); ctx.fill();
      ctx.fillStyle="#7a3d92"; ctx.beginPath(); ctx.arc(o.w/2,12,12,0,7); ctx.fill();
      ctx.fillStyle="#ffea00"; ctx.beginPath(); ctx.arc(o.w/2-4,11,2.5,0,7); ctx.arc(o.w/2+4,11,2.5,0,7); ctx.fill();
      ctx.strokeStyle="#3a1d4a"; ctx.lineWidth=3; ctx.beginPath();
      ctx.moveTo(o.w/2-8,4); ctx.lineTo(o.w/2-12,-4); ctx.moveTo(o.w/2+8,4); ctx.lineTo(o.w/2+12,-4); ctx.stroke();
      ctx.fillStyle="#fff"; ctx.fillRect(o.w/2-6,16,3,3); ctx.fillRect(o.w/2+3,16,3,3); }
    else if(o.type==="crow"){ ctx.fillStyle="#222"; const fw=Math.sin(o.f)*8;
      ctx.beginPath(); ctx.ellipse(o.w/2,o.h/2,o.w/2,o.h/2,0,0,7); ctx.fill();
      ctx.beginPath(); ctx.moveTo(o.w/2-4,o.h/2); ctx.lineTo(0,o.h/2-fw); ctx.lineTo(o.w/2-4,o.h/2-4); ctx.fill();
      ctx.beginPath(); ctx.moveTo(o.w/2+4,o.h/2); ctx.lineTo(o.w,o.h/2-fw); ctx.lineTo(o.w/2+4,o.h/2-4); ctx.fill();
      ctx.fillStyle="#ffae00"; ctx.beginPath(); ctx.moveTo(o.w-2,o.h/2); ctx.lineTo(o.w+6,o.h/2+2); ctx.lineTo(o.w-2,o.h/2+4); ctx.fill(); }
    else if(o.type==="asura"){ ctx.fillStyle="#2e7d32"; const fw=Math.sin(o.f)*6;
      ctx.beginPath(); ctx.ellipse(o.w/2,o.h/2,o.w/2,o.h/2-2,0,0,7); ctx.fill();
      ctx.fillStyle="#1b5e20"; ctx.beginPath(); ctx.moveTo(o.w/2,o.h/2); ctx.lineTo(2,-fw); ctx.lineTo(o.w/2-6,o.h/2-2); ctx.fill();
      ctx.beginPath(); ctx.moveTo(o.w/2,o.h/2); ctx.lineTo(o.w-2,-fw); ctx.lineTo(o.w/2+6,o.h/2-2); ctx.fill();
      ctx.fillStyle="#ffea00"; ctx.beginPath(); ctx.arc(o.w/2-5,o.h/2,2,0,7); ctx.arc(o.w/2+5,o.h/2,2,0,7); ctx.fill(); }
    else if(o.type==="arrow"){ ctx.fillStyle="#7a4a1f"; ctx.fillRect(6,o.h/2-2,o.w-6,4);
      ctx.fillStyle="#bbb"; ctx.beginPath(); ctx.moveTo(0,o.h/2); ctx.lineTo(12,o.h/2-6); ctx.lineTo(12,o.h/2+6); ctx.fill();
      ctx.fillStyle="#ff3b3b"; ctx.fillRect(o.w-6,o.h/2-5,5,10); }
    ctx.restore();
    function flame(cx,cy,w,ty){ ctx.beginPath(); ctx.moveTo(cx-w,cy); ctx.quadraticCurveTo(cx-w,ty,cx,ty-6); ctx.quadraticCurveTo(cx+w,ty,cx+w,cy); ctx.closePath(); ctx.fill(); }
  }

  function drawFx(){
    sparks.forEach(s=>{ ctx.fillStyle=s.c; ctx.fillRect(s.x,s.y,3,3); });
    ctx.font="bold 16px 'Baloo 2',sans-serif"; ctx.textAlign="center";
    floats.forEach(f=>{ ctx.fillStyle="rgba(255,220,120,"+Math.min(1,f.life/20)+")"; ctx.fillText(f.txt,f.x,f.y); });
    ctx.fillStyle="rgba(255,140,160,.85)";
    petals.forEach(p=>{ ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.r);
      ctx.beginPath(); ctx.ellipse(0,0,p.s,p.s*0.5,0,0,7); ctx.fill(); ctx.restore(); });
  }

  function drawIntro(){
    ctx.fillStyle="rgba(20,10,0,.62)"; ctx.fillRect(0,0,W,H);
    ctx.textAlign="center";
    ctx.fillStyle="#ffcf40"; ctx.font="bold 30px 'Baloo 2',sans-serif";
    ctx.fillText("🚩 Hanuman Run",W/2,40);
    ctx.fillStyle="#ffd9a8"; ctx.font="italic 14px 'Baloo 2',sans-serif";
    ctx.fillText("— The Leap to Lanka —",W/2,60);

    ctx.fillStyle="#fff"; ctx.font="14px 'Baloo 2',sans-serif";
    const story=[
      "Mata Sita is held captive by Ravana across the great ocean.",
      "As the mighty Hanuman, journey through forests, mountains and the sea —",
      "SMASH the rakshasas with your gada, leap over rocks & fire, duck the arrows,",
      "then reach Lanka and set it ablaze to complete your mission!",
    ];
    let y=86; story.forEach(t=>{ ctx.fillText(t,W/2,y); y+=20; });

    ctx.font="18px 'Baloo 2',sans-serif"; ctx.fillStyle="#ffe0a8";
    ctx.fillText("🌾 ➜ 🌳 ➜ ⛰️ ➜ 🏖️ ➜ 🌊 ➜ 🔥 Lanka",W/2,y+10);

    ctx.font="bold 14px 'Baloo 2',sans-serif"; ctx.fillStyle="#ffcf40";
    ctx.fillText("⬆ / SPACE  Jump      ⬇  Duck      🔱 / X  Mace Strike",W/2,y+38);

    const a=0.55+0.45*Math.sin(tick*0.12);
    ctx.globalAlpha=a; ctx.fillStyle="#fff"; ctx.font="bold 18px 'Baloo 2',sans-serif";
    ctx.fillText("▶ Press SPACE / Tap to begin",W/2,y+66); ctx.globalAlpha=1;
  }

  function overlay(title,sub,color){
    ctx.fillStyle="rgba(0,0,0,.45)"; ctx.fillRect(0,0,W,H); ctx.textAlign="center";
    ctx.fillStyle=color; ctx.font="bold 40px 'Baloo 2',sans-serif"; ctx.fillText(title,W/2,H/2-6);
    ctx.fillStyle="#fff"; ctx.font="bold 18px 'Baloo 2',sans-serif"; ctx.fillText(sub,W/2,H/2+28);
    ctx.fillStyle="#ffd9a8"; ctx.font="14px 'Baloo 2',sans-serif"; ctx.fillText("High Score: "+hi,W/2,H/2+54);
  }
  function drawHUD(){
    ctx.textAlign="right"; ctx.fillStyle="#fff"; ctx.font="bold 18px 'Baloo 2',sans-serif";
    ctx.fillText("Score "+Math.floor(score),W-14,28);
    ctx.fillStyle="#ffd9a8"; ctx.font="13px 'Baloo 2',sans-serif";
    ctx.fillText("Best "+hi+"   Smashes "+player.smashes,W-14,46);
  }

  // ---------- loop ----------
  let last=performance.now();
  function frame(now){
    const dt=Math.min(2.5,(now-last)/16.67); last=now; tick+=dt;
    if(state==="playing") update(dt);
    drawBg();
    obstacles.forEach(drawObstacle);
    drawHanuman(); drawFx();
    if(state!=="idle") drawHUD();
    if(state==="playing") drawBanner();
    if(state==="idle") drawIntro();
    if(state==="dead") overlay("Oh no! 😵","Press SPACE / tap to try again","#ff7a55");
    if(state==="win"){ confetti.forEach(c=>{ c.x+=c.vx; c.y+=c.vy; c.vy+=0.25; ctx.fillStyle=c.c; ctx.fillRect(c.x,c.y,c.r,c.r); });
      confetti=confetti.filter(c=>c.y<H+10); overlay("विजय! Victory! 🎉","You reached Lanka! Tap to play again","#ffcf40"); }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
